front:
  text: 阿彌陀經通贊疏序大慈恩寺沙門窺基撰詳夫理絶衆詮豈三乘之可攝智圓萬德非十地以能觀布慈雲而廕四生灑法雨而濕九有由是降神兜率誕迹迦維厭欲樂於王宮獲真常於覺樹良以群生業惑魔黨增強騰苦海以闢三途溺慈舟而吞萬善是以高張教網直指淨方是入聖之玄門乃超凡之妙躅十重淨土約地位以等差九品蓮臺契根宜之次第大哉逈拋空有之門獨頴斷常之表佛者覺道已圓説者悲心演法阿彌陀者無量壽也經者常法攝貫也常則百王不易法則千代同規攝則包括衆詮貫則通連妙理故云佛説阿彌陀經也經如是我聞等贊曰將釋此經略以六門料簡第一總敘源由第二別明宗旨第三彰經體用第四翻譯時人第五論於頓漸第六正釋經文且初第一總敘源由者佛從因地發弘誓願願渡衆生今赴宿因故説諸法故法華經方便品云舍利弗當知我本立誓願欲令一切衆如我等無異又壽量品云每自作是念以何令衆生得入無上道速成就佛身若昔因中若今果位每皆發願願令衆生猶如我身得入佛道故酬本願而説諸經又如論説菩薩初生時放大光明普遍十方行至七步觀視四方作師子吼而説偈言我生胎分盡是最末後身我已得解脫當復度衆生為酬此願故説諸經問世尊説法處會頗多何故祇園又談慈典答餘處説法意趣不同維摩經即折其偏執法華經即引入一乘此經起由為破三輪故三種輪者一為破無常輪有情無情皆是無常令生覺悟捨無常故二為破不淨輪有情無情皆是不淨故生歸淨土蓮華化生捨胎胞血肉之身破有情不淨也所居淨土無諸穢惡破器世間不淨也為破不淨輪故三為破苦輪諸衆生為苦逼迫故令歸淨土除此苦故為破此等三種輪故故説此經又為接引二種衆生故一為接引懈怠衆生怯修大行多諸退屈故説此經因微果著令身不退故經云若一日乃至七日便得往生等二為散亂衆生馳流諸境沈淪惡道故説此經指示西方令心專注故問處處説法皆破三輪何故此經獨彰慈意答別經之內雖破三輪斷捨時長不同此典故説為破三輪第二別明宗旨者此方先德總判經論有其四宗一立性宗雜心等是立五聚法有體性故二破性宗成實等是破法體有性唯有相故三破相宗般若等是破法相狀亦成空故四顯實宗涅槃華嚴法華等是顯於真實中道義故捨化城而歸寶所等故此經乃是第四宗也依文判教教但有三以類準宗宗乃有八教但三者一多説有宗説阿含等小乘教是二多説空宗中百十二門般若等是三非有宗華嚴深密法華及此經等是有為無為名之為有我及我所名之為空此等三教處所廣明宗有八者一我法空有宗犢子部等是二有法無我宗薩婆多等是三法無去來宗大衆部等是四現通假實宗説假部等是五俗妄真實宗説出世部等是六諸法但名宗一説部等是七勝義皆空宗般若等經龍樹等説中百論等是八應理圓實宗華嚴法華等及無著等説中道教是此經乃是應理圓實宗收即淨土為宗更有二宗一不説法宗二説法宗且不説法宗龍軍等言佛唯有三法謂大定智悲久離戲論曾不説法由佛慈悲本願緣力衆生識上文義相生雖親依自善根力起而就強緣名為佛説故無性云隨墮八時聞者識上真非真説聚集顯現以為教體故經云始從成道終至涅槃於其中間不説一字如母嚙指子生喚解二者親光等言佛身具有蘊處界等由離分別名無戲論豈不説法名無戲論謂宜聞者善根本願緣力如來識上文義相生此文義相是佛利他善根所起名為佛説聞者識上雖不親得然似彼相分明顯現故名我聞等世親説言謂餘相續識差別故令餘相續差別識生彼此互為增上緣故由此護法等隨機就事教説三乘此經即是大乘所攝三藏之中菩薩藏收十二分中無問自説教問白蓮華教待請方宣淨土經文因何自説答説法華而待請恐生輕慢之情談淨土以自宣為顯慈悲之意旨者旨趣令捨穢土趣向淨方之旨也第三彰經體用者且體即教體以五門分別一攝相歸性皆以真如為體二攝境從心一切唯識三攝假從實即不相應攝歸色心心所四體用別論門即能緣四蘊收本質相分各別攝自他有差別故五聚集顯現門如聞諸行無常四字聚集顯現以為教體唯取佛本質聲名句文四法為體若取影像教體便成有漏若唯取有漏影像為體者即應真實三寶應唯有漏無記若不爾者如何影像教體故知但取無漏聲名句文為體聲是實名句文等是假更有諸師出教體如別處説用者彰穢顯淨為用又顯實證真之用也第四翻譯時人者此經前後有其四譯一秦弘始四年二月八日羅什譯名小無量壽經二宋元嘉年中求那跋陀羅譯四紙三永徽六年大唐三藏於慈恩寺譯名稱讚淨土佛攝受經十紙四後秦又譯出阿彌陀經偈頌一紙而失譯主今此所解者即是秦羅什法師所譯問三時之中此經是何時所攝因此問故略明諸師判教初明此土判教二明西天判教此土判教而有五人一魏時三藏菩提流支此云覺受以佛一代時教總判為一時有二義不同教似有多一教同根異如天雨是一所潤三草二木不同等教法是一衆生悟解不同如聲聞緣覺作四諦十二因緣解菩薩作六度解約根教似有異二理同證異三乘證理不同如三獸之度河淺深別故判教一時二宋朝三藏曇無讖判如來一代時教為頓漸二時頓教者佛一代時有説二空三性三無性八識二無我等教皆是頓教所以華嚴聲聞對目不聞等是漸教者佛一代時有説四諦緣生五八戒等總名漸教三梁朝真諦三藏判如來一代時教為三時一有教二空教三非空非有教且有教者佛初成道七年已後説有教五年度五俱輪第六年化舍利弗第七年度三迦葉總名有教二空教從第八年至三十八年已來總説八部般若等是三非空非有教從三十九年至臨涅槃時説非空非有教法華楞伽思益等是四隋朝崛多笈多二三藏判如來教為四時一生空教二法空教三法相教四觀行教一生空教即十二年前説阿含經等是二法空教即三十八年前説八部般若三法相教者即三十八年後四十九已來説楞伽思益法華經等廣説百法三性三無性八識二無我等是四觀行教者即説華嚴法界觀等是五晉朝劉居士山中隱逸自述意懷判教為五時一人天教二生空教三法空教四俱空教五非空非有教人天教者即佛成道後三七日內為提謂長者説三歸五戒十善等是未有出世善根器故覺受難云提謂經説五百賈人將受五戒先懺悔五逆十惡謗法等罪世尊言四大本淨吾我本淨提謂得不起法忍即無生法忍五百賈人得柔順忍等皆是證聖豈是人天教耶二生空教者即十二年前説二乘之教是三法空教即三十年前説者是四俱空教者即三十八年前説八部般若是五非空非有教者即四十年已來説法華楞伽等經是二西天判教者一勝義俱空宗判教二應理圓實宗判教且初那爛陀寺師子覺智光等依文殊為宗主判教為三時一生空二非空非有三俱空且生空者即廣説二乘等教是二非空非有教者即法華等是三俱空即八部般若是第二應理圓實宗判教者即那爛陀寺有論師名戒賢依彌勒菩薩為宗主判教為三時一有教一代時教説有處是二空教但説空處是三非空非有教但説非空非有處是依圓是有遍計等無是真諦但以將教就時此非也戒賢論師將時就教為正難真諦云佛成道後第二七日説華嚴經豈是第一時教又言四十年後非空非有是第二時教者即佛臨涅槃説遺教經豈是第三時戒賢將時就教判為正此經詮淨土依圓是有遍計等無即是非空非有教也第五論頓漸者曾得二乘果發心向大者名為漸悟由生數少或全無故若從二凡而歸大者即頓悟攝未曾證悟二乘理故生數猶多不名漸悟涅槃經云但説初果回心八萬劫乃至辟支迦十千劫既不説資加二位劫數多少明知五果回心方名漸悟若七方便回心但是頓悟收曾發二乘心曾修二乘行求歸大者皆名漸悟具彼性故修彼行故聞思悟解亦名為悟何必證悟況復亦有生數少者謂已定生即此生及一坐順決擇分等涅槃經且説五果回心而論劫數亦不遮七方便回心亦名漸悟也故知資加二位既亦有生數少明知回心皆是漸悟攝此之二師第一師有教有理第二師無教有理此經者一心不亂十念專精便往淨土頓拋濁世即頓教所收故經云若一日乃至七日一心不亂等
