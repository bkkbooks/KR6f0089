body:
  text: 大慈恩寺沙門窺基撰經曰舍利弗若有善男子善女人聞説阿彌陀佛執持名號若一日若二日若三日若四日若五日若六日若七日一心不亂贊曰第二説多因也善男子者梵云烏波索迦此云近事男索者男聲也堅持五戒堪可親近承事比丘僧故善女人者烏波斯迦斯者是女聲也亦持五戒堪可承事比丘尼故西天分男女二聲故聞説阿彌陀佛者謂於善友處聞此阿彌陀教中往生之事或自尋覽執持佛名號一日乃至七日一心者更無間隔故名曰一心不亂者專注無散也問淨土論云女人及根缺二乘種不生云何相違答只如女子念佛至意專精命盡欲生轉成男子便生淨土有何不可根缺亦爾文殊般若經云若人欲生他方現在淨妙國土者應當隨彼國土佛名一心誦念願往生者必得往生觀佛三昧經云此念佛三昧欲使成就有五因緣一持戒不犯二不起邪見三不生諂慢四不恚不嫉五勇健精進鼓音聲經云令念彼佛名號七日七夜六時禮拜賢愚經云持戒專念七日亦得往生平等覺經及大阿彌陀經並説三輩得生如彼中説經曰其人臨命終時阿彌陀佛與諸聖衆現在其前贊曰第三聖衆來迎也其人者既七日念佛行人也臨命終時者此一報壽命臨欲終時即彼佛與諸聖衆即彼國菩薩聲聞等現身於念佛修行人前如梁朝珍禪師見白銀臺或見化佛來迎也經云是人終時心不顛倒即得往生阿彌陀佛極樂國土贊曰第四衆生往生不顛倒者不移正念也即得往彼國也蓮華化生顏貌端正如諸菩薩心無顛倒意想正修便別穢方頓生淨土故云即得往生問衆生惡業無量如何念佛滅除業障便得往生淨土答十疑論説有三義故能敵惡業一者在心為造罪是虛妄心念佛是真實心以實除虛有何不可如千年之暗不能拒朝日之光二者在境謂造罪緣於顛倒境界念佛緣於勝妙功德以真遣偽有何不可三者在淨謂造罪是染意念佛是淨心淨勝染劣詎可相比如童子撝刀能斷千丈之索一星之火能燒萬束之薪又觀經云於念念中滅除八十億劫生死之罪罪業既除得生何惑西域之人臨命終時皆以幡像前引親友知識助念彌陀令發往生之意是此教也又華嚴云將欲沒者令其憶念想見如來命終得生淨土見有臨命欲終勸念佛名又示尊像令其瞻敬令生善念即得往生問臨終作善便得往生何假預前修諸勝業答人生壽夭難測短長或即病因昏迷或即非時奄逝既闕生前之善難逃後世之殃預作善緣恐防斯咎問往生之人有中有身否答群疑論中有二師義一師云極善極惡無中有二不揀善惡但有捨報受生者皆有中有為傳識故除現世變身即無中有淨土既是極善中有定有有者為正經曰舍利弗我見是利故説此言若有衆生聞是説者應當發願生彼國土贊曰第五結勸往生我見是利者我者世尊稱我也見是利者見是殊常勝利益故勸生彼國也經曰舍利弗如我今者讚嘆阿彌陀佛不可思議功德贊曰第三諸佛證明文分為三初陳自讚言二引他佛證三釋經名字此即初也如我今者自指也彼佛功德不可以心思言議故也經曰東方亦有阿閦鞞佛須彌相佛大須彌佛須彌光佛妙音佛贊曰第二引他佛證稱讚淨土經云十方諸佛此略舉六方便為六段且舉東方每一方各有五段一指國土二舉佛名三辨多少四明證相五引證言今初兩段合一唱也東方者指國土亦有阿閦下舉佛名先引東方者西域以東為上所以先舉阿閦梵語此云無動不被煩惱四魔違順等動故須彌相者謂金容尊狀若須彌大須彌者謂諸相甚大如大山王須彌光者大如山王身光故妙音者其聲微妙清徹遠聞經曰如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界贊曰第三辨多少四明證相如是等恆河沙數諸佛是辨多少各於其國辨明證相也如是等佛數比河沙而不具列故言等也恆河數者梵云殑伽訛略云恆河是河神之名河從彼稱殑音其反去聲也經中説河沙為喻無熱惱池出四大河此河即一也由具五義一由沙多二由世人共為福水入洗罪滅投死生天三雖經劫壞名字常在四佛多近此宣説妙法五衆人共委故多為喻仍取初出池口方四十里河以為喻明證相諸佛各於其國出廣長舌相者即各在本國舒舌相也三千大千世界者準大論云千須彌山千日月千四天下及千梵王是謂小千以小千為一數至千名大千故名三千非小中故為大千俱舍論云小千至初禪中千至二禪大千至三禪俱同一成壞遍此故云遍故云遍覆三千大千世界也表無量劫來口離四過感此舌相也證小事即覆面門以至髮際今證大事故至三千今説因微果勝恐衆生疑此乃拋苦惱之要門證常樂之疾路事既廣大現瑞非輕舒舌相而遍覆大千證西方而真快樂經曰説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經贊曰第五引證詞經文易見誠者實也問汝等者為是六方諸佛告語自國聽徒為當釋迦勸誡祇園之衆答觀此經勢而有二意一他方諸佛告自國聽衆二釋迦轉引彼佛意言證彼西方令一會衆生信敬也一切諸佛所護念經者即是此經也準此具足應名稱讚阿彌陀佛不可思議功德其文略也一切諸佛所護念經者諸佛護持明記憶念也即衆行雖廣難方念佛之功德福然多爭並持經之力故使六方諸佛以神力而護持沙界聖人乃一念而憶念故云一切諸佛所護念經問若釋迦談於淨土可言佛所護念諸佛不説此經何説佛所護念答王言是敕佛語成經既稱讚於淨方此説便成經也或可佛所護念者即指釋迦所説阿彌陀經也問靈山開塔要假召集分身舍衛啓筵何故不邀諸佛答召佛開其寶塔赴彼佛之願心證土啓相信誠顯此尊之悲意但各居自國不至此方也經曰舍利弗南方世界有日月燈佛名聞光佛大焰肩佛須彌燈佛無量精進佛贊曰第二南方也分五如前此前二段也一指國土二舉佛名可知日月燈佛者身光智光內外俱照故名聞光者有大名聞光照內外或聞名見光生覺悟故大焰肩者身光發焰出於肩故或肩者齊也即身光智光皆發焰齊也須彌燈者身光如燈焰有破暗故無量精進者利樂有情也經曰如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界贊曰第三辨多少第四明證相行相如何經曰説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經贊曰第五引證詞亦同前釋經曰舍利弗西方世界有無量壽佛無量相佛無量幢佛大光佛大明佛寶相佛淨光佛贊曰第三西方同前五段此二文也無量壽者即西方本尊依二義得名如前已解問儒宗尚無自伐其善何故彌陀自讚難思答據其文勢即是諸佛稱讚又設若彌陀自讚於理何違引轉衆生令生勝意無量相者相好無量故無量幢者身量功德高而復峻由如幢也大光者身智二光無不照故大明者得佛三明無不知故即正遍知也寶相者內外二相皆可寶重故淨光者淨者無漏光者身智二光故言淨光也經曰如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界贊曰第三第四文也如上説也經曰説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經贊曰第五文也引證詞可知經曰舍利弗北方世界有焰肩佛最勝音佛難阻佛日生佛網明佛贊曰第四北方證也文五同前焰肩佛義同於前最勝音音聲美妙勝過餘故難阻佛者諸魔不能阻礙故日生者依智慧日流聲教故或依智慧日令衆生生諸善法故網明者施此教網令衆生生於明解故經曰如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界贊曰第三第四文如前可知經曰説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經贊曰第五段文意可知也經曰舍利弗下方世界有師子佛名聞佛名光佛達磨佛法幢佛持法佛贊曰第五下方證也文五同前此二文也師子佛者如於師子獸中自在佛於法中自在故得此名又世師子伏諸猛獸佛即伏四魔也名聞者名振十方故名光者聞名見光生覺悟故達磨者梵語此云法也以法為身即有為無為諸法所依止故法幢佛者廣開大法高峻如幢故也持法佛者持過去佛法付未來故經曰如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界贊曰第三第四文相可知經曰説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經贊曰第五文也行相同前經曰舍利弗上方世界有梵音佛宿王佛香上佛香光佛大焰肩佛雜色寶華嚴身佛娑羅樹王佛寶華德佛見一切義佛如須彌山佛贊曰第六上方佛文五同前此初二文也梵音者聲相美妙聞者悅心故宿王佛者宿者星也月是星中之王佛者是十地菩薩二乘凡夫之王也得自在故香上佛者戒德馨香更無過上故香光佛者馨香自遠光彩教門故大焰肩佛者身肩發焰故雜色寶華嚴身佛者心華發明自嚴飾故或可雜色衆寶以嚴其身飾形可以美價故娑羅樹王佛者如大樹王能覆癊故佛能覆癊諸衆生故寶華德佛者身智功德如寶可重故見一切義佛者義者境也佛具五眼見一切境故如須彌山佛者福智如山巍巍高峻故經曰如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界贊曰第三第四文可知也經云説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經贊曰第五文也同前可知經云舍利弗於汝意云何何故名為一切諸佛所護念經贊曰第三釋經名字文分為三初徵問次通釋後結勸此初也世尊云汝舍利弗還知此經如何得名一切諸佛所護念經否經曰舍利弗若有善男子善女人聞是諸佛所説名及經名者是諸善男子善女人皆為一切諸佛共所護念皆得不退轉於阿耨多羅三藐三菩提贊曰此是第二通釋也善男子善女人等是所護人也聞是阿彌陀佛及聞六方恆沙佛名者能護念人也是諸善男子善女人皆為一切諸佛所護念者得正護念也即受持經及佛名男子女兒因聞諸佛及釋迦佛説修淨土經方始得生淨土即此經是諸佛所匡護明記憶念故阿耨多羅三藐三菩提者阿之言無耨多羅云上三云正藐云等三云正菩提云覺即是無上正等正覺問為但念阿彌陀佛即得不退為更有餘方便答非但稱念禮敬又應至心於諸佛前懺悔勸請隨喜回向發願由懺悔故轉諸定業如如意珠隨願即得不退轉為由諸佛護念故於無上正等覺心得不退也經云是故舍利弗汝等皆當信受我語及諸佛所説贊曰此第三結勸也是故者結上之詞皆當等者勸勵之語汝等信我上來所説及六方諸佛之言經云舍利弗若有人已發願今發願當發願欲生阿彌陀佛國者贊曰自下第四三生發願文分為四第一發心往生第二彰其勝益第三位居三世第四勸生彼國此即初也已發願者過去今發願者現在當發願者是未來欲者希望也生者即五蘊假者也經云是諸人等皆得不退轉於阿耨多羅三藐三菩提贊曰第二彰其勝益念佛發願故一即彼佛冥加二即此佛潛衛遂令求道之心不退願生之志不轉故言不退轉若已發願已得不退今發願者即現在今得不退當發願者當得不退轉也經曰於彼國土若已生若今生若當生贊曰第三位居三世已發願者為過去發願者已生今發願者為現在者即生未來發願者為未來未來發願當生經曰是故舍利弗諸善男子善女人若有信者應當發願生彼國土贊曰第四勸生彼國若有信心深重煩惱輕微知大覺以誠言獲良願而當往也經曰舍利弗如我今者稱讚諸佛不可思議功德彼諸佛等亦稱説我不可思議功德贊曰第五彼尊讚歎咸曰希奇文有四段初讚功德難思二歎化行濁世三嗟訝成佛四説法幽玄此文是初我讚六方諸佛能為衆生作真實語衆生因此心無疑惑又彌陀如來慈悲接引我等偏讚彼佛彼佛復讚於我經曰而作是言釋迦牟尼佛能為甚難希有之事能於娑婆國土五濁惡世劫濁見濁煩惱濁衆生濁命濁中贊曰第二歎化行濁世而作是言結集家敘也釋迦梵語此云能仁牟尼此云寂默得姓之緣如別處説言甚難希有之事者即是忍苦教化衆生之事也能於娑婆國土者梵云娑婆此云堪忍堪可忍受苦惱之事故也五濁惡世者略以五門一釋名二出體三對治四廢立五相攝初釋名者濁是滓穢義如食滓穢下惡可污名之為濁此言意説劫增之時三災漸輕煩惱轉薄衆生向好惡見漸微命根轉長漸漸向勝已上好可欣名之為清衆生無苦化佛不出世諸化佛出世必向劫減小三災漸起煩惱轉厚衆生向惡染見漸增命根轉短漸漸向劣下惡可厭故立濁名五者是數帶數釋也次望別名皆持業釋也或以別揀總亦依主釋二出體者地持論云謂今世人多皆短壽極長百歲是名命濁此以本識名言種子由業所引功能差別命根為體善業力弱命根漸短由殺生業之所感故若諸衆生不識父母不識沙門及宗族尊長不修義理不怖不畏今世後世惡業果報不修惠施不作功德不修齊法不持禁戒是名有情濁雖第八識名為有情今説由近惡外緣故五蘊假者作惡無善名有情濁合以第八識及五為性若此衆生增非法貪或惠刀劍或施器仗諍訟鬪亂諂曲妄語攝受邪法及餘惡不善法是名煩惱濁除五見外所餘一切煩惱隨煩惱皆煩惱濁體此非法貪惠刀劍等令行殺害或慳好財但捨刀劍因非法貪諍等竟起乃至諸餘惡不善法通攝一切煩惱隨煩惱盡由性數習逢惡境牽煩惱尤重若於今世法壞法沒像法漸起邪法轉生是名見濁此以五見而為體性多近外道惡見數生若飢饉劫起疾病劫起刀兵劫起是名劫濁此以色蘊四塵為體或通五蘊仍是不相應時為其體依四五蘊而建立故煩惱增多惡業尤重便招惡果三災遂生三對治者智度論中立四悉檀悉檀宗也一世界悉檀二為人悉檀三對治悉檀四第一義諦悉檀劫濁衆生濁世界悉檀治之識器世間衆生世間悉皆虛幻厭怖修道即永離故命濁以各各為人悉檀治之識知人由善業所得修持淨戒行不殺等命自長故或為三乘之人各説自乘涅槃之果便除生死所有命濁煩惱濁見濁對治悉檀治之修習隨應對治之道令不起故由三悉檀破五濁故入第一義證會真宗四廢立者何故唯立五濁不增減耶答衆生有二一惡行謂在家白衣二邪行謂出家外道白衣無慧煩惱增時名煩惱濁外道邪解浪推求時立為見濁又諸鈍惑名煩惱濁諸餘利惑名為見濁由此二因得當果時離合不同復分二濁合二內果名衆生濁惡衆生故合二外果總名劫濁惡器具故劫謂時分時無別時依法辨故劫濁故以惡器為體此惡衆生及與外果雖復總陳是二濁果未辨何者正惡果體今顯根本故立命濁或內惡果名為命濁外惡果者名為劫濁此惡因果由誰而有謂惡衆生故名衆生濁由此五濁據增行相欲令生厭故偏説五五相攝者薩遮尼乾子經云立十二濁一示現劫濁二示現時濁三示現衆生濁四示現煩惱濁五示現命濁六示現三乘差別濁七示現不淨國土濁八示現難化衆生濁九示現説種種煩惱濁十示現外道亂濁十一示現魔濁十二示現魔業濁劫濁及時即劫濁衆生及難化衆生即衆生濁煩惱及説種種煩惱即煩惱濁命即命濁外道亂即是見濁此八即五濁餘之四種謂三乘差別不淨國土魔及魔業非五濁攝五濁據勝唯實雜染十二濁通能化能障佛示現故問何故釋迦百歲時生彌勒八萬歲出答各據本願出時不同故經曰得阿耨多羅三藐三菩提贊曰第三嗟訝成佛緣此界境唯穢惡人不足是非證菩提如火內生蓮得解脫似氷中出燭故也經曰為諸衆生説是一切世間難信之法讚曰第四説法幽玄難信之法者只如此典一朝誦佛十念精進誠超五濁之穢方登初地之淨域豈非難信哉上來第五彼尊讚嘆咸曰希奇訖經曰舍利弗當知我於五濁惡世行此難事贊曰下第六段我佛敘陳獨稱難事文分為四初敘行難修二敘果難證三敘法難信四總結甚難此即初也行此難事者即三僧祇劫萬行備修捐身命以殉菩提捨國城而為郡衆方成正覺豈非難事也經曰得阿耨多羅三藐三菩提贊曰此第二敘果難證如上已解其文可知經曰為一切世間説此難信之法贊曰此第三敘法難信也經曰是為甚難贊曰此第四段總結甚難結上三事上來已解正宗分訖經曰佛説此經已舍利弗及諸比丘一切世間天人阿修羅等聞佛所説歡喜信受作禮而去贊曰第三流通分文有四段初説經事畢二聽法緣終三聞法歡欣四退辭佛去四段合一唱也佛説此經已者是第一説經事畢及諸下文皆結集之語也舍利弗及諸比丘一切世間天人阿修羅等聞佛所説者是第二聽法緣終言世間者即有情世間也可破壞故天人者天即欲界六天天者即光潔自在名天人即人趣謂多忍義名人阿修羅此云非天如人不仁名曰非人修羅亦爾歡喜信受者是第三聞法歡欣顏舒曰歡神悅曰喜故云歡喜即意識相應喜受也此經乃三乘妙旨衆聖要樞出生死之鴻源證真常之疾路得路得聞圓備豈不樂哉故云歡喜問先標聽徒之處兼明菩薩聲聞經終作禮歡欣何故不明菩薩答迓影略説不必俱陳作禮而去者是第四退辭佛去五輪俱屈三業歸誠咸別世尊各還本土故云作禮而去此慈恩所撰阿彌陀經通贊一卷者祐世僧統於元豐元祐之間入于中華求得將到流通之本也豫助洪願付於廣教院命工重剶自戊辰十月十九日起首至十二月十日畢乎矣所有功德自利利他此世來生福慧圓滿普與含識同會樂方時大安五年已已二月晦日記海東大慈恩玄化寺住持廣祐僧統釋韶顯題件書等豫以嘉保二年孟冬下旬西府郎會宋人柳裕傳語高麗王子義天誂求極樂要書彌陀行願相應經典章疏等其後折裕守約以永長二年丁丑三月二十三日丁丑送自義天所傳得彌陀極樂書等十三部二十卷則以同五月二十三日家時興福寺淨名院到來懇誠相臻清素自𢝷仍以彼本已重新寫善種不朽宿心爰成欲為自他法界往生極樂之因緣矣康和四年壬午四月二十二日未剋藥師寺西室大房書寫畢願以此書寫善根先二親消滅罪障次桓賢終往生極樂矣生年三十一但此書者桓賢沒後門弟之中常住僧房修學為宗之輩可傳領也嘉曆元年丙寅六月十七日依衆議誂有小生分書寫所奉奇符春日社西新談議屋也大法師源覺
